<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>포켓몬고 PVP 계산기</title>
<style>
  :root {
    --bg: #f3f5f9; --card: #ffffff; --ink: #26324e; --sub: #68738a;
    --accent: #4a6cf7; --accent2: #eef2fe; --line: #e4e8f0;
    --navy: #26324e; --yellow: #ffcb05;
    --gold: #d4a017; --purple: #8b5cf6; --green: #16a34a; --gray: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif; background: var(--bg); color: var(--ink); padding: 18px 12px 60px; }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 { font-size: 27px; font-weight: 900; letter-spacing: -0.5px; color: var(--navy); text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 4px 0 6px; }
  h1 svg { flex: 0 0 auto; }
  .subtitle { text-align: center; color: var(--sub); font-size: 12px; margin-bottom: 18px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(38,50,78,.06); }
  .label { font-size: 12px; font-weight: 800; color: var(--navy); margin-bottom: 8px; letter-spacing: .02em; display: flex; align-items: center; gap: 6px; }
  .label::before { content: ""; width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid var(--navy); background: linear-gradient(180deg, #e3350d 46%, #fff 54%); flex: 0 0 auto; }
  /* search */
  .searchbox { position: relative; }
  #search { width: 100%; padding: 12px 14px; font-size: 16px; border: 1.5px solid var(--line); border-radius: 10px; outline: none; background: #fafbfd; }
  #search:focus { border-color: var(--accent); background: #fff; }
  #suggest { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1px solid var(--line); border-radius: 10px; max-height: 260px; overflow-y: auto; z-index: 50; box-shadow: 0 8px 24px rgba(20,30,60,.12); display: none; }
  .sitem { padding: 10px 14px; font-size: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .sitem:active, .sitem:hover { background: var(--accent2); }
  .sitem .dex { color: var(--sub); font-size: 12px; }
  .sitem b { color: var(--ink); font-weight: 800; }
  .picked { margin-top: 10px; font-size: 14px; color: var(--sub); display: none; }
  .picked strong { color: var(--ink); font-size: 16px; }
  /* IV grid */
  .ivrow { margin-bottom: 12px; }
  .ivrow:last-child { margin-bottom: 0; }
  .ivhead { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .ivname { font-size: 13px; font-weight: 700; }
  .ivval { font-size: 15px; font-weight: 800; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
  .cell { padding: 8px 0; text-align: center; font-size: 13px; font-weight: 600; border: 1px solid var(--line); border-radius: 7px; background: #fafbfd; cursor: pointer; user-select: none; color: #44506a; }
  .cell.on { color: #fff; border-color: transparent; }
  .atk .cell.on { background: #ef4444; } .atk .ivval { color: #ef4444; }
  .def .cell.on { background: #3b82f6; } .def .ivval { color: #3b82f6; }
  .sta .cell.on { background: #22c55e; } .sta .ivval { color: #22c55e; }
  .hint { font-size: 11px; color: var(--sub); line-height: 1.6; }
  /* nickname generator */
  .stylechips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .chip { padding: 7px 12px; font-size: 13px; font-weight: 700; border: 1.5px solid var(--line); border-radius: 999px; background: #fafbfd; cursor: pointer; color: var(--sub); user-select: none; }
  .chip.on { background: #8b7cf0; border-color: #8b7cf0; color: #fff; }
  .nickrow { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: #fafbfd; margin-bottom: 8px; cursor: pointer; }
  .nickrow:last-child { margin-bottom: 0; }
  .nickrow:active { background: var(--accent2); border-color: var(--accent); }
  .nickleague { flex: 0 0 58px; text-align: center; font-size: 12px; font-weight: 800; color: #fff; border-radius: 7px; padding: 5px 0; }
  .nicktext { flex: 1; font-size: 19px; font-weight: 700; letter-spacing: .03em; word-break: break-all; }
  .nickcopy { flex: 0 0 auto; font-size: 12px; font-weight: 700; color: var(--accent); }
  .nickrow.copied { border-color: var(--green); }
  .nickrow.copied .nickcopy { color: var(--green); }
  /* results */
  .league { display: flex; align-items: center; gap: 12px; padding: 13px 4px; border-bottom: 1px solid var(--line); }
  .league:last-child { border-bottom: 0; }
  .lbadge { flex: 0 0 74px; text-align: center; border-radius: 10px; padding: 8px 2px; font-weight: 800; font-size: 13px; color: #fff; }
  .lbadge small { display: block; font-weight: 600; font-size: 10px; opacity: .9; }
  .gl { background: #2f80ed; } .ul { background: #f2b135; } .ml { background: #9b51e0; }
  .linfo { flex: 1; min-width: 0; }
  .rankline { font-size: 18px; font-weight: 900; color: var(--ink); }
  .rankline .rsub { font-size: 13px; font-weight: 800; color: var(--ink); margin-left: 4px; }
  .rankline .pct { font-size: 14px; font-weight: 800; color: var(--ink); margin-left: 8px; }
  .subline { font-size: 12px; color: var(--sub); margin-top: 3px; line-height: 1.5; }
  .bar { height: 5px; background: #edf0f5; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .bar i { display: block; height: 100%; border-radius: 3px; background: linear-gradient(90deg, #a1c4fd 0%, #c2b8f7 35%, #f6c6ea 70%, #ffdca8 100%); }
  #results .placeholder { text-align: center; color: var(--sub); font-size: 14px; padding: 18px 0; }
  /* explainer */
  details { font-size: 13px; color: var(--sub); line-height: 1.65; }
  summary { cursor: pointer; font-weight: 700; color: var(--ink); font-size: 13px; }
  details p { margin-top: 8px; }
  .foot { text-align: center; color: #a5adbd; font-size: 11px; margin-top: 16px; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <h1><svg viewBox="0 0 24 24" width="27" height="27" aria-hidden="true"><circle cx="12" cy="12" r="10.5" fill="#fff" stroke="#26324e" stroke-width="2"/><path d="M1.5 12a10.5 10.5 0 0 1 21 0z" fill="#e3350d" stroke="#26324e" stroke-width="2"/><line x1="1.5" y1="12" x2="22.5" y2="12" stroke="#26324e" stroke-width="2"/><circle cx="12" cy="12" r="3.4" fill="#fff" stroke="#26324e" stroke-width="2"/></svg>포켓몬고 PVP 계산기</h1>
  <div class="subtitle">슈퍼 · 하이퍼 · 마스터리그 개체값 순위 (4096개 조합 기준)</div>

  <div class="card">
    <div class="label">포켓몬 검색</div>
    <div class="searchbox">
      <input id="search" type="text" placeholder="이름 입력" autocomplete="off">
      <div id="suggest"></div>
    </div>
    <div class="picked" id="picked"></div>
  </div>

  <div class="card">
    <div class="label">개체값 선택 (0~15)</div>
    <div class="ivrow atk">
      <div class="ivhead"><span class="ivname">공격</span><span class="ivval" id="v-atk">-</span></div>
      <div class="grid" id="g-atk"></div>
    </div>
    <div class="ivrow def">
      <div class="ivhead"><span class="ivname">방어</span><span class="ivval" id="v-def">-</span></div>
      <div class="grid" id="g-def"></div>
    </div>
    <div class="ivrow sta">
      <div class="ivhead"><span class="ivname">체력</span><span class="ivval" id="v-sta">-</span></div>
      <div class="grid" id="g-sta"></div>
    </div>
  </div>

  <div class="card" id="results">
    <div class="placeholder">포켓몬과 개체값을 선택하면 결과가 표시됩니다</div>
  </div>

  <div class="card" id="nickcard" style="display:none">
    <div class="label">닉네임 생성기 <span style="font-weight:600">— 탭해서 복사</span></div>
    <div class="stylechips" id="stylechips"></div>
    <div id="nicklist"></div>
    <div class="hint" style="margin-top:8px">복사한 뒤 포켓몬 이름에 붙여넣으세요. 특수문자 스타일(𝐒·𝓢)이 기기나 게임에서 □로 보이면 S# 스타일을 사용하세요.</div>
  </div>

  <div class="foot">데이터: pogoapi.net (기초 스탯 · CPM) · 계산식: PvPoke 기준<br>스탯이 동일한 폼(예: 알로라 텅구리)은 통합 표시될 수 있습니다</div>
</div>

// parse data
const MONS = [];
for (const chunk of RAW.split(";")) {
  const [idPart, statPart] = chunk.split(":");
  const [idStr, fIdx] = idPart.split(".");
  if (fIdx !== undefined && FORMS[+fIdx] === "Eternamax") continue;
  const [a, d, s] = statPart.split(",").map(Number);
  const dex = +idStr;
  const koBase = KO[dex - 1] || ("#" + dex);
  let name;
  if (fIdx !== undefined) name = koBase + " (" + (FORM_KO[FORMS[+fIdx]] || FORMS[+fIdx]) + ")";
  else name = BASE_LABEL[dex] ? koBase + (BASE_LABEL[dex] ? " (" + BASE_LABEL[dex] + ")" : "") : koBase;
  MONS.push({ dex, name, a, d, s });
}

// ---- state
let cur = null, ivs = { atk: null, def: null, sta: null };
const maxLevel = 50;

// ---- search
const $ = id => document.getElementById(id);
const searchEl = $("search"), sugEl = $("suggest");
searchEl.addEventListener("input", () => {
  const q = searchEl.value.trim();
  if (!q) { sugEl.style.display = "none"; return; }
  const hits = MONS.filter(m => m.name.includes(q)).slice(0, 30);
  if (!hits.length) { sugEl.style.display = "none"; return; }
  sugEl.innerHTML = hits.map((m, i) =>
    '<div class="sitem" data-i="' + MONS.indexOf(m) + '">' +
    '<span>' + m.name.replace(q, "<b>" + q + "</b>") + '</span>' +
    '<span class="dex">No.' + m.dex + '</span></div>').join("");
  sugEl.style.display = "block";
});
sugEl.addEventListener("click", e => {
  const item = e.target.closest(".sitem");
  if (!item) return;
  cur = MONS[+item.dataset.i];
  searchEl.value = cur.name;
  sugEl.style.display = "none";
  const p = $("picked");
  p.style.display = "block";
  p.innerHTML = "<strong>" + cur.name + "</strong> &nbsp;No." + cur.dex +
    " &nbsp;·&nbsp; 기초스탯 공 " + cur.a + " / 방 " + cur.d + " / 체 " + cur.s;
  render();
});
document.addEventListener("click", e => { if (!e.target.closest(".searchbox")) sugEl.style.display = "none"; });

// ---- IV grids
[["atk","g-atk","v-atk"],["def","g-def","v-def"],["sta","g-sta","v-sta"]].forEach(([key, gid, vid]) => {
  const g = $(gid);
  for (let n = 0; n <= 15; n++) {
    const c = document.createElement("div");
    c.className = "cell"; c.textContent = n;
    c.addEventListener("click", () => {
      ivs[key] = n;
      $(vid).textContent = n;
      [...g.children].forEach((el, i) => el.classList.toggle("on", i === n));
      render();
    });
    g.appendChild(c);
  }
});

// ---- engine
function cpOf(m, a, d, s, idx) {
  const k = CPM[idx];
  return Math.max(10, Math.floor((m.a + a) * Math.sqrt(m.d + d) * Math.sqrt(m.s + s) * k * k / 10));
}
function rankAll(m, cap) {
  const maxIdx = Math.round((maxLevel - 1) * 2);
  const list = new Array(4096);
  let p = 0;
  for (let a = 0; a <= 15; a++) for (let d = 0; d <= 15; d++) for (let s = 0; s <= 15; s++) {
    let idx = maxIdx;
    if (cap !== Infinity) while (idx > 0 && cpOf(m, a, d, s, idx) > cap) idx--;
    const k = CPM[idx];
    const atk = (m.a + a) * k, def = (m.d + d) * k, hp = Math.floor((m.s + s) * k);
    list[p++] = { a, d, s, product: atk * def * hp, atk, hp, cp: cpOf(m, a, d, s, idx), level: 1 + idx / 2 };
  }
  list.sort((x, y) => y.product - x.product || y.atk - x.atk || y.hp - x.hp || y.cp - x.cp);
  return list;
}
function render() {
  const R = $("results");
  if (!cur || ivs.atk === null || ivs.def === null || ivs.sta === null) {
    R.innerHTML = '<div class="placeholder">' + (cur ? "개체값 세 개를 모두 선택하세요" : "포켓몬과 개체값을 선택하면 결과가 표시됩니다") + "</div>";
    $("nickcard").style.display = "none";
    return;
  }
  const leagues = [
    { name: "슈퍼리그", sub: "CP 1500", cls: "gl", cap: 1500 },
    { name: "하이퍼리그", sub: "CP 2500", cls: "ul", cap: 2500 },
    { name: "마스터리그", sub: "제한 없음", cls: "ml", cap: Infinity }
  ];
  let html = "";
  const ranks = {};
  for (const lg of leagues) {
    const list = rankAll(cur, lg.cap);
    const best = list[0];
    const i = list.findIndex(e => e.a === ivs.atk && e.d === ivs.def && e.s === ivs.sta);
    const e = list[i], rank = i + 1;
    ranks[lg.cls] = rank;
    const fit = (e.product / best.product * 100);
    const topPct = (rank / 4096 * 100);
    html += '<div class="league">' +
      '<div class="lbadge ' + lg.cls + '">' + lg.name + '<small>' + lg.sub + '</small></div>' +
      '<div class="linfo">' +
      '<div class="rankline">' + rank + '위 <span class="rsub">(상위 ' + topPct.toFixed(1) + '%)</span>' +
      '<span class="pct">적합도 ' + fit.toFixed(2) + '%</span></div>' +
      '<div class="subline">Lv ' + e.level + ' · CP ' + e.cp +
      ' &nbsp;|&nbsp; 1위: ' + best.a + "/" + best.d + "/" + best.s + " (Lv " + best.level + ", CP " + best.cp + ")</div>" +
      '<div class="bar"><i style="width:' + fit.toFixed(1) + '%"></i></div>' +
      "</div></div>";
  }
  R.innerHTML = html;
  renderNicknames(ranks);
}

// ---- nickname generator
const SUP = { "0":"⁰","1":"¹","2":"²","3":"³","4":"⁴","5":"⁵","6":"⁶","7":"⁷","8":"⁸","9":"⁹" };
const sup = n => String(n).split("").map(c => SUP[c]).join("");
const NICK_FONTS = {
  scr:  { S: "𝓢", H: "𝓗", M: "𝓜" },   // bold script
  bold: { S: "𝐒", H: "𝐇", M: "𝐌" }    // serif bold
};
const NICK_STYLES = [
  { name: "S#123", fmt: (L, r) => L + "#" + r },
  { name: "𝐒¹²³", fmt: (L, r) => NICK_FONTS.bold[L] + sup(r) },
  { name: "𝓢123", fmt: (L, r) => NICK_FONTS.scr[L] + r }
];
let nickStyle = 0, lastRanks = null;
function renderNicknames(ranks) {
  lastRanks = ranks;
  const card = $("nickcard");
  card.style.display = "block";
  $("stylechips").innerHTML = NICK_STYLES.map((s, i) =>
    '<span class="chip' + (i === nickStyle ? " on" : "") + '" data-i="' + i + '">' + s.name + "</span>").join("");
  const rows = [
    { key: "gl", L: "S", label: "슈퍼", cls: "gl" },
    { key: "ul", L: "H", label: "하이퍼", cls: "ul" },
    { key: "ml", L: "M", label: "마스터", cls: "ml" }
  ];
  $("nicklist").innerHTML = rows.map(rw => {
    const t = NICK_STYLES[nickStyle].fmt(rw.L, ranks[rw.key]);
    return '<div class="nickrow" data-text="' + t + '">' +
      '<span class="nickleague ' + rw.cls + '">' + rw.label + '</span>' +
      '<span class="nicktext">' + t + '</span>' +
      '<span class="nickcopy">복사</span></div>';
  }).join("");
  [...$("nicklist").children].forEach(row => {
    row.addEventListener("click", () => copyText(row.dataset.text, row));
  });
  [...$("stylechips").children].forEach(ch => {
    ch.addEventListener("click", () => { nickStyle = +ch.dataset.i; renderNicknames(lastRanks); });
  });
}
function copyText(t, row) {
  const done = () => {
    row.classList.add("copied");
    row.querySelector(".nickcopy").textContent = "복사됨!";
    setTimeout(() => { row.classList.remove("copied"); row.querySelector(".nickcopy").textContent = "복사"; }, 1500);
  };
  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = t; ta.style.cssText = "position:fixed;left:-9999px;top:0";
    ta.setAttribute("readonly", "");
    document.body.appendChild(ta);
    ta.select(); ta.setSelectionRange(0, t.length);
    try { document.execCommand("copy"); done(); } catch (e) { prompt("길게 눌러 복사하세요:", t); }
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(t).then(done).catch(fallback);
  } else fallback();
}
